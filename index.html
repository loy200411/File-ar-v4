<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL PESO DEL CIELO - AR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            color: #1d1d1f;
        }

        .container {
            text-align: center;
            max-width: 90%;
        }

        h1 {
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 30px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .image-container {
            position: relative;
            display: inline-block;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background: white;
            transition: transform 0.3s ease;
        }

        .image-container:hover {
            transform: scale(1.02);
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
            max-height: 60vh;
        }

        .ar-footer {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #0071e3; /* Bleu style Apple moderne */
            transition: opacity 0.2s;
        }

        .ar-footer:hover {
            opacity: 0.7;
        }

        .ar-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 8px;
            background-color: #0071e3;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l-9 5v10l9 5 9-5V7l-9-5zm0 2.3l6.5 3.6-6.5 3.6-6.5-3.6 6.5-3.6zM5 15.7V8.9l6 3.3v6.8l-6-3.3zm14 0l-6 3.3v-6.8l6-3.3v6.8z"/></svg>') no-repeat center;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l-9 5v10l9 5 9-5V7l-9-5zm0 2.3l6.5 3.6-6.5 3.6-6.5-3.6 6.5-3.6zM5 15.7V8.9l6 3.3v6.8l-6-3.3zm14 0l-6 3.3v-6.8l6-3.3v6.8z"/></svg>') no-repeat center;
        }

        .ar-text {
            font-weight: 300;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>IL PESO DEL CIELO</h1>

        <div class="image-container">
            <img src="votre-image.jpg" alt="Il Peso Del Cielo">
        </div>

        <a href="#" class="ar-footer">
            <div class="ar-icon"></div>
            <span class="ar-text">CLICK FOR AR</span>
        </a>
    </div>

</body>
</html>
